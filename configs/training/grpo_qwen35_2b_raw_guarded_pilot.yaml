  optim: adamw_8bit
  max_grad_norm: 0.1
  save_steps: 25
  behavior_similarity_threshold: 0.35
  execution_pass_rate_threshold: 1.0
  min_completion_ratio: 0.2
  max_invalid_completion_ratio: 0.9
  reward_weights:
    format: 1.0
    cleanup: 1.25
    naming: 0.0
    compile: 3.0
    behavior: 3.0
    readability: 0.5
    signature: 1.0
    hallucination_penalty: 1.0
    decompiler_type_penalty: 0.75
