model:
  base_model_id: Qwen/Qwen3.5-2B
  loader_variant: unsloth
training:
  max_seq_length: 2048
  load_in_4bit: true
  precision: bf16
  lora_rank: 32
  batch_size: 1
  grad_accum_steps: 4
  epochs: 1
  max_steps: 100
  learning_rate: 2.0e-4
  adam_beta1: 0.9
  adam_beta2: 0.999
  weight_decay: 0.0
  warmup_ratio: 0.03
  lr_scheduler_type: linear
  max_grad_norm: 1.0
  save_steps: 50
