model:
  base_model_id: Qwen/Qwen3.5-2B
  source_training_profile:
  loader_variant: unsloth
training:
  max_seq_length: 1536
  load_in_4bit: true
  precision: bf16
  lora_rank: 32
  batch_size: 1
  grad_accum_steps: 1
  epochs: 1
  max_steps: 300
  max_prompt_length: 896
  max_completion_length: 384
  generations_per_prompt: 4
  loss_type: dr_grpo
  multi_reward_weights: [1.0, 1.0, 1.0]
  scale_rewards: group
  beta: 0.0
  mask_truncated_completions: true
  learning_rate: 1.5e-6
  adam_beta1: 0.9
  adam_beta2: 0.99
  weight_decay: 0.1
  warmup_ratio: 0.1
  lr_scheduler_type: cosine
  optim: adamw_8bit
  max_grad_norm: 0.1
  save_steps: 75
  behavior_similarity_threshold: 0.35
  execution_pass_rate_threshold: 1.0
  min_completion_ratio: 0.2
  max_completion_ratio: 1.5
  max_invalid_completion_ratio: 0.9
  max_function_count: 1
  reward_weights:
    format: 1.0
    cleanup: 1.0
    naming: 0.0
    compile: 3.5
    behavior: 3.5
    readability: 0.35
    signature: 1.5
    hallucination_penalty: 1.25
    decompiler_type_penalty: 0.75
    overshoot_penalty: 1.0
    multi_function_penalty: 3.0
    invalid_json_penalty: 0.35
    invalid_length_penalty: 1.0
    truncation_penalty: 2.0
    invalid_scope_penalty: 2.0
